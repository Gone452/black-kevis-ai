<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Kevis AI - Live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: #000000;
      padding: 18px 24px;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #ff00aa;
    }
    .header::before { content: "◆"; font-size: 1.8rem; }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .message {
      max-width: 82%;
      padding: 16px 22px;
      border-radius: 22px;
      line-height: 1.6;
      animation: fadeIn 0.3s ease;
    }
    .user { align-self: flex-end; background: linear-gradient(135deg, #ff00aa, #aa00ff); color: white; border-bottom-right-radius: 6px; }
    .ai { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; border-bottom-left-radius: 6px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: none; } }

    .input-area {
      padding: 20px 24px;
      background: #000000;
      border-top: 1px solid #222;
    }
    .input-wrapper {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
    }
    #user-input {
      flex: 1;
      padding: 16px 24px;
      border: none;
      border-radius: 30px;
      background: #1a1a1a;
      color: white;
      font-size: 1.05rem;
      outline: none;
      resize: none;
      max-height: 160px;
    }
    #send-btn {
      width: 56px; height: 56px;
      border: none;
      background: linear-gradient(135deg, #ff00aa, #aa00ff);
      color: white;
      border-radius: 50%;
      font-size: 1.7rem;
      cursor: pointer;
      transition: transform 0.2s;
    }
    #send-btn:hover { transform: scale(1.1); }
    .typing { color: #ff00aa; font-size: 0.8rem; padding: 10px 24px; display: none; }
  </style>
</head>
<body>

  <div class="header">BLACK KEVIS AI</div>

  <div class="chat-container" id="chat">
    <div class="message ai">System Online. Your API key is linked. What's the plan for today?</div>
  </div>

  <div id="typing" class="typing">Black Kevis is processing...</div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="user-input" rows="1" placeholder="Type a message..."></textarea>
      <button id="send-btn">↑</button>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
  </script>

  <script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const API_KEY = "AIzaSyDlZImvOTFYY8DfiU8yNHOYbZQBDs6gLb8";
    const genAI = new GoogleGenerativeAI(API_KEY);
    
    // Using Gemini 1.5 Flash for high speed and reliability
    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

    const chat = document.getElementById('chat');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing');

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      userInput.value = '';
      userInput.style.height = 'auto';
      typingIndicator.style.display = 'block';

      try {
        const result = await model.generateContent(text);
        const response = await result.response;
        const aiText = response.text();

        typingIndicator.style.display = 'none';
        addMessage(aiText, 'ai');
      } catch (err) {
        typingIndicator.style.display = 'none';
        addMessage("Error: Check your API quota or internet connection.", 'ai');
        console.error(err);
      }
    }

    function addMessage(text, sender) {
      const msg = document.createElement('div');
      msg.className = `message ${sender}`;
      // Basic markdown-like line break support
      msg.innerHTML = `<div>${text.replace(/\n/g, '<br>')}</div>`;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
    });
  </script>
</body>
</html>
