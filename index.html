<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Kevis AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: #000000;
      padding: 18px 24px;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #ff00aa;
    }
    .header::before {
      content: "◆";
      font-size: 1.8rem;
    }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: #0a0a0a;
    }
    .message {
      max-width: 82%;
      padding: 16px 22px;
      border-radius: 22px;
      line-height: 1.6;
      animation: fadeIn 0.3s ease;
    }
    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #ff00aa, #aa00ff);
      color: white;
      border-bottom-right-radius: 6px;
    }
    .ai {
      align-self: flex-start;
      background: #1a1a1a;
      border: 1px solid #333;
      border-bottom-left-radius: 6px;
    }
    .ai img {
      max-width: 100%;
      border-radius: 14px;
      margin-top: 12px;
      border: 1px solid #333;
    }
    .typing {
      align-self: flex-start;
      background: #1a1a1a;
      padding: 16px 22px;
      border-radius: 22px;
      border-bottom-left-radius: 6px;
      display: flex;
      gap: 7px;
    }
    .dot {
      width: 9px;
      height: 9px;
      background: #ff00aa;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: none; } }

    .input-area {
      padding: 20px 24px;
      background: #000000;
      border-top: 1px solid #222;
    }
    .input-wrapper {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
    }
    #user-input {
      flex: 1;
      padding: 16px 24px;
      border: none;
      border-radius: 30px;
      background: #1a1a1a;
      color: white;
      font-size: 1.05rem;
      outline: none;
      resize: none;
      max-height: 160px;
    }
    #send-btn {
      width: 56px;
      height: 56px;
      border: none;
      background: linear-gradient(135deg, #ff00aa, #aa00ff);
      color: white;
      border-radius: 50%;
      font-size: 1.7rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    #send-btn:hover {
      transform: scale(1.08);
    }
    .welcome {
      text-align: center;
      margin: 80px 20px 40px;
      color: #aaa;
    }
    .welcome h1 {
      font-size: 2.8rem;
      background: linear-gradient(90deg, #ff00aa, #aa00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <div class="header">
    BLACK KEVIS AI
  </div>

  <div class="chat-container" id="chat">
    <div class="welcome">
      <h1>Black Kevis AI</h1>
      <p>Ready. Unfiltered. Powerful.</p>
      <p style="margin-top: 20px; font-size: 1rem;">
        Ask anything or type: "generate a photo of..." to create images
      </p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="user-input" rows="1" placeholder="Type your message..."></textarea>
      <button id="send-btn">↑</button>
    </div>
  </div>

  <script>
    // === PUT YOUR GEMINI API KEY HERE ===
    const API_KEY = "AIzaSyBG6DnCKLRjkS7Ld0kew20LqOzT9rkQAyE";   // ← Replace with your real key from Google AI Studio

    const MODEL = "gemini-2.5-flash";   // Fast + supports image generation

    const chat = document.getElementById('chat');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // Auto resize textarea
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
    });

    function addMessage(text, sender, imageUrl = null) {
      const msg = document.createElement('div');
      msg.className = `message ${sender}`;

      if (sender === 'user') {
        msg.textContent = text;
      } else {
        const content = document.createElement('div');
        content.innerHTML = text.replace(/\n/g, '<br>');
        msg.appendChild(content);

        if (imageUrl) {
          const img = document.createElement('img');
          img.src = imageUrl;
          img.alt = "Generated by Black Kevis AI";
          msg.appendChild(img);
        }
      }
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.id = 'typing';
      typing.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
      chat.appendChild(typing);
      chat.scrollTop = chat.scrollHeight;
      return typing;
    }

    async function callGemini(prompt) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;

      const body = {
        contents: [{ role: "user", parts: [{ text: prompt }] }],
        generationConfig: {
          responseModalities: ["TEXT", "IMAGE"]
        }
      };

      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (!res.ok) throw new Error("API request failed");
      return await res.json();
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      if (!API_KEY || API_KEY === "YOUR_GEMINI_API_KEY_HERE") {
        alert("Please replace 'YOUR_GEMINI_API_KEY_HERE' with your real Gemini API key!");
        return;
      }

      addMessage(text, 'user');
      userInput.value = '';
      userInput.style.height = 'auto';

      const typing = showTyping();

      try {
        const data = await callGemini(text);
        typing.remove();

        let aiText = "";
        let imageUrl = null;

        const parts = data.candidates?.[0]?.content?.parts || [];

        for (const part of parts) {
          if (part.text) aiText += part.text + "\n";
          if (part.inlineData) {
            imageUrl = `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`;
          }
        }

        if (!aiText.trim()) aiText = "Here's your generation:";

        addMessage(aiText.trim(), 'ai', imageUrl);

      } catch (err) {
        typing.remove();
        addMessage("Error connecting to Black Kevis AI. Check your API key and internet.", 'ai');
        console.error(err);
      }
    }

    // Event Listeners
    sendBtn.addEventListener('click', sendMessage);

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Welcome message after load
    window.onload = () => {
      setTimeout(() => {
        addMessage("I'm Black Kevis AI. Ready when you are. Ask me anything — text or image generation.", 'ai');
      }, 600);
    };
  </script>
</body>
</html>
