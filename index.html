<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Kevis AI - Local</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: #000000;
      padding: 18px 24px;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #ff00aa;
    }
    .header::before { content: "◆"; font-size: 1.8rem; }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: #0a0a0a;
    }
    .message {
      max-width: 82%;
      padding: 16px 22px;
      border-radius: 22px;
      line-height: 1.6;
      animation: fadeIn 0.3s ease;
    }
    .user { align-self: flex-end; background: linear-gradient(135deg, #ff00aa, #aa00ff); color: white; border-bottom-right-radius: 6px; }
    .ai { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; border-bottom-left-radius: 6px; }

    .typing {
      align-self: flex-start;
      background: #1a1a1a;
      padding: 16px 22px;
      border-radius: 22px;
      border-bottom-left-radius: 6px;
      display: flex;
      gap: 7px;
      font-size: 0.9rem;
      color: #ff00aa;
    }
    .dot {
      width: 9px; height: 9px;
      background: #ff00aa;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: none; } }

    .input-area {
      padding: 20px 24px;
      background: #000000;
      border-top: 1px solid #222;
    }
    .input-wrapper {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
    }
    #user-input {
      flex: 1;
      padding: 16px 24px;
      border: none;
      border-radius: 30px;
      background: #1a1a1a;
      color: white;
      font-size: 1.05rem;
      outline: none;
      resize: none;
      max-height: 160px;
    }
    #send-btn {
      width: 56px; height: 56px;
      border: none;
      background: linear-gradient(135deg, #ff00aa, #aa00ff);
      color: white;
      border-radius: 50%;
      font-size: 1.7rem;
      cursor: pointer;
    }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .welcome { text-align: center; margin: 80px 20px 40px; color: #aaa; }
    .welcome h1 {
      font-size: 2.8rem;
      background: linear-gradient(90deg, #ff00aa, #aa00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status-bar { font-size: 0.8rem; color: #666; text-align: center; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div class="header">BLACK KEVIS AI</div>

  <div class="chat-container" id="chat">
    <div class="welcome">
      <h1>Black Kevis AI</h1>
      <p>Local Hardware Mode • No API Required</p>
      <div id="loading-status" class="status-bar">Initializing WebGPU...</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="user-input" rows="1" placeholder="Wait for model to load..." disabled></textarea>
      <button id="send-btn" disabled>↑</button>
    </div>
  </div>

  <script type="module">
    // Import WebLLM directly in the script
    import * as webllm from "https://esm.run/@mlc-ai/webllm";

    const chat = document.getElementById('chat');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const statusText = document.getElementById('loading-status');

    // Using a tiny model (SmolLM) so it downloads fast (approx 300MB)
    const selectedModel = "SmolLM2-135B-Instruct-q4f16_1-MLC";
    let engine;

    async function initAI() {
      try {
        engine = await webllm.CreateMLCEngine(selectedModel, {
          initProgressCallback: (report) => {
            statusText.textContent = report.text;
          }
        });
        
        statusText.textContent = "Local Engine Ready.";
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.placeholder = "Type your message...";
        addMessage("Local AI is ready. Everything stays on your computer.", 'ai');
      } catch (err) {
        statusText.textContent = "Error: WebGPU not supported or load failed.";
        console.error(err);
      }
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || !engine) return;

      addMessage(text, 'user');
      userInput.value = '';
      userInput.style.height = 'auto';

      const typing = showTyping();

      try {
        const messages = [{ role: "user", content: text }];
        const chunks = await engine.chat.completions.create({ messages });
        const aiResponse = chunks.choices[0].message.content;

        typing.remove();
        addMessage(aiResponse, 'ai');
      } catch (err) {
        typing.remove();
        addMessage("Local processing error: " + err.message, 'ai');
      }
    }

    function addMessage(text, sender) {
      const msg = document.createElement('div');
      msg.className = `message ${sender}`;
      msg.innerHTML = `<div>${text.replace(/\n/g, '<br>')}</div>`;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div> &nbsp; Thinking...`;
      chat.appendChild(typing);
      chat.scrollTop = chat.scrollHeight;
      return typing;
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
    });

    // Start loading immediately
    initAI();
  </script>
</body>
</html>
