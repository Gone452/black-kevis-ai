<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Kevis AI - Instant Mode</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: #000000;
      padding: 18px 24px;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #ff00aa;
    }
    .header::before { content: "◆"; font-size: 1.8rem; }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .message {
      max-width: 82%;
      padding: 16px 22px;
      border-radius: 22px;
      line-height: 1.6;
      animation: fadeIn 0.3s ease;
    }
    .user { align-self: flex-end; background: linear-gradient(135deg, #ff00aa, #aa00ff); color: white; border-bottom-right-radius: 6px; }
    .ai { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; border-bottom-left-radius: 6px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: none; } }

    .input-area {
      padding: 20px 24px;
      background: #000000;
      border-top: 1px solid #222;
    }
    .input-wrapper {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
    }
    #user-input {
      flex: 1;
      padding: 16px 24px;
      border: none;
      border-radius: 30px;
      background: #1a1a1a;
      color: white;
      font-size: 1.05rem;
      outline: none;
      resize: none;
    }
    #send-btn {
      width: 56px; height: 56px;
      border: none;
      background: linear-gradient(135deg, #ff00aa, #aa00ff);
      color: white;
      border-radius: 50%;
      font-size: 1.7rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">BLACK KEVIS AI</div>

  <div class="chat-container" id="chat">
    <div class="message ai">Yo! I'm back on the cloud. Ask me anything, no loading needed.</div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="user-input" rows="1" placeholder="Type your message..."></textarea>
      <button id="send-btn">↑</button>
    </div>
  </div>

  <script>
    // PUT YOUR KEY HERE
    const API_KEY = "AIzaSyDlZImvOTFYY8DfiU8yNHOYbZQBDs6gLb8";
    const MODEL = "gemini-1.5-flash";

    const chat = document.getElementById('chat');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      userInput.value = '';

      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ parts: [{ text }] }] })
        });

        const data = await res.json();
        const aiResponse = data.candidates[0].content.parts[0].text;
        addMessage(aiResponse, 'ai');
      } catch (err) {
        addMessage("Connection error. Check your API key.", 'ai');
      }
    }

    function addMessage(text, sender) {
      const msg = document.createElement('div');
      msg.className = `message ${sender}`;
      msg.textContent = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    sendBtn.addEventListener('click', sendMessage);
  </script>
</body>
</html>
