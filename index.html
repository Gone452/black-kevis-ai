<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Kevis AI - GitHub Edition</title>
  <script src="coi-serviceworker.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: #000000;
      padding: 18px 24px;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #ff00aa;
    }
    .header::before { content: "◆"; font-size: 1.8rem; }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .message {
      max-width: 82%;
      padding: 16px 22px;
      border-radius: 22px;
      line-height: 1.6;
    }
    .user { align-self: flex-end; background: linear-gradient(135deg, #ff00aa, #aa00ff); color: white; border-bottom-right-radius: 6px; }
    .ai { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; border-bottom-left-radius: 6px; }

    .input-area {
      padding: 20px 24px;
      background: #000000;
      border-top: 1px solid #222;
    }
    .input-wrapper {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
    }
    #user-input {
      flex: 1;
      padding: 16px 24px;
      border: none;
      border-radius: 30px;
      background: #1a1a1a;
      color: white;
      outline: none;
      resize: none;
    }
    #send-btn {
      width: 56px; height: 56px;
      border: none;
      background: linear-gradient(135deg, #ff00aa, #aa00ff);
      color: white;
      border-radius: 50%;
      cursor: pointer;
    }
    .status-bar { font-size: 0.8rem; color: #ff00aa; text-align: center; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div class="header">BLACK KEVIS AI</div>

  <div class="chat-container" id="chat">
    <div style="text-align: center; margin-top: 50px;">
      <h1 style="color: #ff00aa; font-size: 2.5rem;">Local Mode</h1>
      <p id="loading-status" class="status-bar">Checking WebGPU...</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="user-input" rows="1" placeholder="Loading AI..." disabled></textarea>
      <button id="send-btn" disabled>↑</button>
    </div>
  </div>

  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/webllm";

    const chat = document.getElementById('chat');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const statusText = document.getElementById('loading-status');

    // Tiny 300MB model
    const selectedModel = "SmolLM2-135B-Instruct-q4f16_1-MLC";
    let engine;

    async function initAI() {
      try {
        engine = await webllm.CreateMLCEngine(selectedModel, {
          initProgressCallback: (report) => {
            statusText.textContent = report.text;
          }
        });
        
        statusText.textContent = "Hardware Ready.";
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.placeholder = "Message Black Kevis...";
      } catch (err) {
        statusText.textContent = "WebGPU failed. Use Chrome/Edge.";
        console.error(err);
      }
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || !engine) return;

      addMessage(text, 'user');
      userInput.value = '';

      try {
        const reply = await engine.chat.completions.create({ 
            messages: [{ role: "user", content: text }] 
        });
        addMessage(reply.choices[0].message.content, 'ai');
      } catch (err) {
        addMessage("Error: " + err.message, 'ai');
      }
    }

    function addMessage(text, sender) {
      const msg = document.createElement('div');
      msg.className = `message ${sender}`;
      msg.textContent = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    sendBtn.addEventListener('click', sendMessage);
    initAI();
  </script>
</body>
</html>
