<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Kevis - Local AI</title>
  <script src="coi-serviceworker.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 20px; font-weight: bold; color: #ff00aa; border-bottom: 1px solid #222; text-align: center; background: #000; }
    #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .msg { max-width: 80%; padding: 12px 18px; border-radius: 20px; line-height: 1.5; animation: fadeIn 0.3s ease; }
    .user { align-self: flex-end; background: #ff00aa; color: #fff; border-bottom-right-radius: 4px; }
    .ai { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; border-bottom-left-radius: 4px; }
    .progress-container { padding: 20px; background: #111; border-top: 1px solid #222; }
    #progress-bar { width: 0%; height: 4px; background: #ff00aa; transition: width 0.3s; margin-bottom: 8px; }
    #status { font-size: 0.75rem; color: #888; text-align: center; }
    .input-area { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
    input { flex: 1; padding: 14px 20px; border-radius: 25px; border: none; background: #1a1a1a; color: #fff; outline: none; }
    button { background: #ff00aa; color: #fff; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    button:disabled { opacity: 0.2; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>

  <div class="header">BLACK KEVIS LOCAL</div>
  
  <div id="chat">
    <div class="msg ai">Welcome. I run entirely on your hardware. No data leaves this device.</div>
  </div>

  <div class="progress-container" id="loader">
    <div id="progress-bar"></div>
    <div id="status">Initializing WebGPU Engine...</div>
  </div>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="Please wait for model to load..." disabled>
    <button id="send-btn" disabled>Send</button>
  </div>

  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/webllm";

    const model = "Qwen2-0.5B-Instruct-q4f16_1-MLC";
    let engine;

    const statusEl = document.getElementById('status');
    const progressEl = document.getElementById('progress-bar');
    const inputEl = document.getElementById('user-input');
    const btnEl = document.getElementById('send-btn');
    const loaderEl = document.getElementById('loader');

    async function init() {
      try {
        engine = await webllm.CreateMLCEngine(model, {
          initProgressCallback: (p) => {
            const pct = Math.round(p.progress * 100);
            progressEl.style.width = pct + "%";
            statusEl.textContent = p.text;
            if (pct >= 100) {
              setTimeout(() => loaderEl.style.display = 'none', 1000);
            }
          }
        });
        inputEl.disabled = false;
        btnEl.disabled = false;
        inputEl.placeholder = "Message Black Kevis...";
      } catch (e) {
        statusEl.textContent = "WebGPU Error: Use Chrome/Edge or check browser settings.";
        console.error(e);
      }
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;

      addMsg(text, 'user');
      inputEl.value = '';
      
      const reply = await engine.chat.completions.create({ 
        messages: [{ role: "user", content: text }] 
      });
      addMsg(reply.choices[0].message.content, 'ai');
    }

    function addMsg(t, s) {
      const d = document.createElement('div');
      d.className = `msg ${s}`;
      d.textContent = t;
      const chat = document.getElementById('chat');
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
    }

    btnEl.onclick = send;
    inputEl.onkeypress = (e) => { if(e.key === 'Enter') send(); };

    init();
  </script>
</body>
</html>
