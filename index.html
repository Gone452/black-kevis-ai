<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Kevis - Ultra Local</title>
  <script src="coi-serviceworker.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 20px; font-weight: bold; color: #ff00aa; border-bottom: 1px solid #222; text-align: center; }
    #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .msg { max-width: 80%; padding: 12px; border-radius: 15px; line-height: 1.4; }
    .user { align-self: flex-end; background: #ff00aa; color: #fff; }
    .ai { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; }
    .status { font-size: 0.7rem; color: #666; text-align: center; padding: 10px; }
    .input-area { padding: 20px; background: #000; display: flex; gap: 10px; }
    input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #1a1a1a; color: #fff; outline: none; }
    button { background: #ff00aa; color: #fff; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; }
    button:disabled { opacity: 0.3; }
  </style>
</head>
<body>

  <div class="header">BLACK KEVIS LOCAL</div>
  <div id="chat"></div>
  <div id="status" class="status">Loading WebGPU Engine...</div>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="Wait for load..." disabled>
    <button id="send-btn" disabled>Send</button>
  </div>

  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/webllm";

    // This is the smallest "smart" model available for stable local use
    const model = "Qwen2-0.5B-Instruct-q4f16_1-MLC";
    let engine;

    async function init() {
      try {
        engine = await webllm.CreateMLCEngine(model, {
          initProgressCallback: (p) => { document.getElementById('status').textContent = p.text; }
        });
        document.getElementById('status').textContent = "Local AI Active";
        document.getElementById('user-input').disabled = false;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('user-input').placeholder = "Type here...";
      } catch (e) {
        document.getElementById('status').textContent = "WebGPU Error. Use Chrome/Edge.";
      }
    }

    async function send() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      addMsg(text, 'user');
      input.value = '';
      
      const reply = await engine.chat.completions.create({ messages: [{ role: "user", content: text }] });
      addMsg(reply.choices[0].message.content, 'ai');
    }

    function addMsg(t, s) {
      const d = document.createElement('div');
      d.className = `msg ${s}`;
      d.textContent = t;
      document.getElementById('chat').appendChild(d);
      document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    }

    document.getElementById('send-btn').onclick = send;
    document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') send(); };

    init();
  </script>
</body>
</html>
