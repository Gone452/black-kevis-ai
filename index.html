<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Kevis AI - Final</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .header { background: #000; padding: 18px 24px; font-size: 1.5rem; font-weight: 700; border-bottom: 1px solid #222; color: #ff00aa; }
    .chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
    .message { max-width: 82%; padding: 16px 22px; border-radius: 22px; line-height: 1.6; }
    .user { align-self: flex-end; background: linear-gradient(135deg, #ff00aa, #aa00ff); color: white; border-bottom-right-radius: 6px; }
    .ai { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; border-bottom-left-radius: 6px; }
    .input-area { padding: 20px 24px; background: #000; border-top: 1px solid #222; }
    .input-wrapper { max-width: 900px; margin: 0 auto; display: flex; gap: 12px; }
    #user-input { flex: 1; padding: 16px 24px; border: none; border-radius: 30px; background: #1a1a1a; color: white; outline: none; resize: none; }
    #send-btn { width: 56px; height: 56px; border: none; background: #ff00aa; color: white; border-radius: 50%; cursor: pointer; font-size: 1.5rem; }
    .debug-info { color: #ff4444; font-size: 0.75rem; background: #221111; padding: 10px; border-radius: 10px; margin-top: 10px; display: none; }
  </style>
</head>
<body>

  <div class="header">BLACK KEVIS AI</div>
  <div class="chat-container" id="chat">
    <div class="message ai">System Online. If I hit a wall, I'll show you why below.</div>
  </div>
  <div id="debug" class="debug-info"></div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="user-input" rows="1" placeholder="Type a message..."></textarea>
      <button id="send-btn">↑</button>
    </div>
  </div>

  <script>
    const API_KEY = "AIzaSyDlZImvOTFYY8DfiU8yNHOYbZQBDs6gLb8";
    const chat = document.getElementById('chat');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const debugBox = document.getElementById('debug');

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      userInput.value = '';
      debugBox.style.display = 'none';

      try {
        // Updated to use Gemini 1.5 Flash (most stable for Free Tier in 2026)
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: text }] }]
          })
        });

        const data = await response.json();

        if (data.error) {
          showError(`GOOGLE ERROR (${data.error.code}): ${data.error.message}`);
          return;
        }

        const aiText = data.candidates[0].content.parts[0].text;
        addMessage(aiText, 'ai');
      } catch (err) {
        showError("NETWORK ERROR: Check if your browser or ISP is blocking Google APIs.");
        console.error(err);
      }
    }

    function addMessage(text, sender) {
      const msg = document.createElement('div');
      msg.className = `message ${sender}`;
      msg.innerHTML = `<div>${text.replace(/\n/g, '<br>')}</div>`;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    function showError(text) {
      debugBox.textContent = text;
      debugBox.style.display = 'block';
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
